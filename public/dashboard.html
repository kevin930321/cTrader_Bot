<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.7);
            --bg-card-hover: rgba(30, 41, 59, 0.8);
            --bg-inset: rgba(0, 0, 0, 0.3);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(99, 102, 241, 0.3);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --green: #10b981;
            --green-soft: rgba(16, 185, 129, 0.15);
            --red: #ef4444;
            --red-soft: rgba(239, 68, 68, 0.15);
            --amber: #f59e0b;
            --amber-soft: rgba(245, 158, 11, 0.15);
            --blue: #3b82f6;
            --blue-soft: rgba(59, 130, 246, 0.15);
            --purple: #8b5cf6;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background ambient */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(59, 130, 246, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* ═══ Header ═══ */
        .header {
            text-align: center;
            padding: 28px 24px 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 30%, #a78bfa 70%, #c084fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            margin-bottom: 4px;
        }

        .header-sub {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .header-clock {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* ═══ Status Pills ═══ */
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
            backdrop-filter: blur(8px);
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .pill-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .pill-green { background: var(--green-soft); color: var(--green); border-color: rgba(16, 185, 129, 0.2); }
        .pill-green .pill-dot { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse-dot 2s infinite; }
        .pill-red { background: var(--red-soft); color: var(--red); border-color: rgba(239, 68, 68, 0.2); }
        .pill-red .pill-dot { background: var(--red); }
        .pill-blue { background: var(--blue-soft); color: var(--blue); border-color: rgba(59, 130, 246, 0.2); }
        .pill-blue .pill-dot { background: var(--blue); box-shadow: 0 0 6px var(--blue); animation: pulse-dot 1.5s infinite; }
        .pill-amber { background: var(--amber-soft); color: var(--amber); border-color: rgba(245, 158, 11, 0.2); }
        .pill-amber .pill-dot { background: var(--amber); }
        .pill-muted { background: rgba(100, 116, 139, 0.12); color: var(--text-muted); border-color: rgba(100, 116, 139, 0.15); }
        .pill-muted .pill-dot { background: var(--text-muted); }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ═══ Cards ═══ */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-card);
            transition: var(--transition);
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow-card), var(--shadow-glow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ═══ Price Hero ═══ */
        .price-hero {
            text-align: center;
            padding: 30px 20px;
        }

        .price-hero .price-main {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            transition: color 0.3s;
            line-height: 1.1;
        }

        .price-hero .price-sub {
            margin-top: 10px;
            font-size: 0.88rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .price-hero .price-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .price-hero .price-tag-label {
            color: var(--text-muted);
        }

        .price-hero .price-tag-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--text-primary);
        }

        .price-flash-up { animation: flash-up 0.4s ease; }
        .price-flash-down { animation: flash-down 0.4s ease; }
        @keyframes flash-up { 0% { color: var(--green); } 100% { color: var(--text-primary); } }
        @keyframes flash-down { 0% { color: var(--red); } 100% { color: var(--text-primary); } }

        /* ═══ Stats Grid ═══ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .stat-cell {
            background: var(--bg-inset);
            border-radius: var(--radius-sm);
            padding: 14px 12px;
            text-align: center;
            border: 1px solid var(--border-subtle);
            transition: var(--transition);
        }

        .stat-cell:hover {
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .stat-label {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 6px;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .c-green { color: var(--green); }
        .c-red { color: var(--red); }
        .c-blue { color: var(--blue); }
        .c-amber { color: var(--amber); }
        .c-purple { color: var(--purple); }

        /* ═══ Equity Chart ═══ */
        .chart-wrap {
            position: relative;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--bg-inset);
            border: 1px solid var(--border-subtle);
        }

        #equity-chart {
            width: 100%;
            height: 220px;
            display: block;
            cursor: crosshair;
        }

        /* ═══ Params Grid ═══ */
        .params-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .param-group label {
            display: block;
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .param-group input {
            width: 100%;
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: var(--bg-inset);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            outline: none;
            transition: var(--transition);
        }

        .param-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        /* ═══ Buttons ═══ */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
        .btn:active { transform: translateY(0) scale(0.98); }

        .btn-accent { background: var(--accent); color: #fff; }
        .btn-green { background: var(--green); color: #fff; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-amber { background: var(--amber); color: #000; }
        .btn-orange { background: #f97316; color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent-light);
        }

        .actions-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* ═══ Positions ═══ */
        .pos-card {
            background: var(--bg-inset);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: var(--transition);
        }

        .pos-card:hover { border-color: rgba(255, 255, 255, 0.12); }

        .pos-side {
            width: 4px;
            height: 44px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .pos-side-long { background: var(--green); box-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }
        .pos-side-short { background: var(--red); box-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }

        .pos-info { flex: 1; min-width: 0; }

        .pos-type {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .pos-detail {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 3px;
            font-family: 'JetBrains Mono', monospace;
        }

        .pos-pnl {
            text-align: right;
            flex-shrink: 0;
        }

        .pos-pnl-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
        }

        .pos-pnl-id {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .pos-close-btn {
            background: var(--red-soft);
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            flex-shrink: 0;
            transition: var(--transition);
            font-family: inherit;
        }

        .pos-close-btn:hover {
            background: var(--red);
            color: #fff;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 28px 20px;
            font-size: 0.88rem;
        }

        /* ═══ Log Console ═══ */
        .log-console {
            background: #000;
            border-radius: var(--radius-sm);
            padding: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            line-height: 1.6;
            color: #4ade80;
            height: 220px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .log-console::-webkit-scrollbar { width: 5px; }
        .log-console::-webkit-scrollbar-track { background: transparent; }
        .log-console::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        /* ═══ Responsive ═══ */
        @media (max-width: 640px) {
            .price-hero .price-main { font-size: 2.4rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .params-grid { grid-template-columns: repeat(2, 1fr); }
            .header-title { font-size: 1.25rem; }
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="header-title">⚡ Trading Bot</div>
            <div class="header-sub">cTrader Open API · Automated Execution</div>
            <div class="header-clock" id="clock">--:--:--</div>
            <div class="status-bar">
                <span id="conn-pill" class="pill pill-muted"><span class="pill-dot"></span>連線中...</span>
                <span id="watch-pill" class="pill pill-muted"><span class="pill-dot"></span>待機</span>
                <span id="trade-pill" class="pill pill-muted"><span class="pill-dot"></span>未交易</span>
                <span id="pause-pill" class="pill pill-amber" style="display:none"><span class="pill-dot"></span>暫停中</span>
            </div>
        </div>

        <!-- Price -->
        <div class="card price-hero">
            <div class="price-main" id="current-price">--</div>
            <div class="price-sub">
                <span class="price-tag">
                    <span class="price-tag-label">基準點</span>
                    <span class="price-tag-value" id="open-price">--</span>
                </span>
                <span class="price-tag">
                    <span class="price-tag-label">價差</span>
                    <span class="price-tag-value" id="price-diff">--</span>
                </span>
                <span class="price-tag">
                    <span class="price-tag-label">Bid</span>
                    <span class="price-tag-value" id="bid-price">--</span>
                </span>
                <span class="price-tag">
                    <span class="price-tag-label">Ask</span>
                    <span class="price-tag-value" id="ask-price">--</span>
                </span>
            </div>
        </div>

        <!-- Account Stats -->
        <div class="card">
            <div class="card-header"><span class="card-title">📊 帳戶概覽</span></div>
            <div class="stats-grid">
                <div class="stat-cell"><div class="stat-label">餘額</div><div class="stat-value c-green" id="balance">$--</div></div>
                <div class="stat-cell"><div class="stat-label">淨值</div><div class="stat-value" id="equity">$--</div></div>
                <div class="stat-cell"><div class="stat-label">已用保證金</div><div class="stat-value" id="usedMargin">$--</div></div>
                <div class="stat-cell"><div class="stat-label">可用保證金</div><div class="stat-value" id="freeMargin">$--</div></div>
                <div class="stat-cell"><div class="stat-label">勝率</div><div class="stat-value c-purple" id="win-rate">--</div></div>
                <div class="stat-cell"><div class="stat-label">勝場</div><div class="stat-value c-green" id="wins">0</div></div>
                <div class="stat-cell"><div class="stat-label">敗場</div><div class="stat-value c-red" id="losses">0</div></div>
                <div class="stat-cell"><div class="stat-label">槓桿</div><div class="stat-value" id="leverage">--</div></div>
            </div>
        </div>

        <!-- Equity Chart -->
        <div class="card">
            <div class="card-header"><span class="card-title">📈 績效曲線</span></div>
            <div class="chart-wrap">
                <canvas id="equity-chart"></canvas>
            </div>
        </div>

        <!-- Positions -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">💼 持倉 (<span id="position-count">0</span>)</span>
            </div>
            <div id="positions-list">
                <div class="empty-state">目前無持倉</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="card">
            <div class="card-header"><span class="card-title">🎮 操作控制</span></div>
            <div class="actions-row">
                <button class="btn btn-accent" onclick="toggleWatch()">👁️ 切換盯盤</button>
                <button id="pause-btn" class="btn btn-orange" onclick="togglePause()">⏸️ 暫停交易</button>
                <button class="btn btn-green" onclick="fetchOpenPrice()">📊 取得基準點</button>
                <button class="btn btn-amber" onclick="resetDaily()">🔄 重置今日</button>
                <button class="btn btn-red" onclick="closeAllPositions()">⚠️ 緊急平倉</button>
            </div>
        </div>

        <!-- Strategy Params -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">⚙️ 策略參數</span>
                <button class="btn btn-accent btn-sm" onclick="saveConfig()">💾 儲存</button>
            </div>
            <div class="params-grid">
                <div class="param-group"><label>Entry Offset</label><input type="number" id="cfg-entryOffset" value="10"></div>
                <div class="param-group"><label>Long TP</label><input type="number" id="cfg-longTP" value="8"></div>
                <div class="param-group"><label>Short TP</label><input type="number" id="cfg-shortTP" value="5"></div>
                <div class="param-group"><label>Long SL</label><input type="number" id="cfg-longSL" value="1000"></div>
                <div class="param-group"><label>Short SL</label><input type="number" id="cfg-shortSL" value="1000"></div>
                <div class="param-group"><label>Lot Size</label><input type="number" id="cfg-lotSize" value="0.1" step="0.01"></div>
                <div class="param-group"><label>盯盤開始 (分)</label><input type="number" id="cfg-minsAfterOpen" value="1" min="0" max="60"></div>
                <div class="param-group"><label>基準偏移 (分)</label><input type="number" id="cfg-baselineOffsetMinutes" value="0" min="0" max="60"></div>
            </div>
        </div>

        <!-- Logs -->
        <div class="card">
            <div class="card-header"><span class="card-title">📜 即時日誌</span></div>
            <div class="log-console" id="logs">
                <div>等待日誌...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        const PRICE_MULTIPLIER = 100000;
        let socket = null, socketConnected = false, lastLogFetch = 0;
        let lastPrice = null;

        // ═══ Utilities ═══
        function throttle(fn, ms) {
            let t; return (...a) => { if (!t) { fn(...a); t = true; setTimeout(() => t = false, ms); } };
        }

        function formatPnL(pnl) {
            if (pnl == null) return { text: '--', color: 'var(--text-muted)' };
            return {
                text: (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(2),
                color: pnl >= 0 ? 'var(--green)' : 'var(--red)'
            };
        }

        // ═══ Clock ═══
        function updateClock() {
            const now = new Date();
            const tp = new Intl.DateTimeFormat('zh-TW', {
                timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            }).format(now);
            document.getElementById('clock').textContent = '🕒 台北時間 ' + tp;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ═══ Positions ═══
        function renderPosition(pos) {
            const isLong = pos.type === 'long';
            const pnl = formatPnL(pos.pnl);
            return `<div class="pos-card">
                <div class="pos-side ${isLong ? 'pos-side-long' : 'pos-side-short'}"></div>
                <div class="pos-info">
                    <div class="pos-type">${isLong ? '📈' : '📉'} ${pos.type.toUpperCase()}</div>
                    <div class="pos-detail">Entry: ${pos.entryPrice?.toFixed(2) ?? '--'} · Vol: ${pos.volume?.toFixed(2) ?? '--'}</div>
                </div>
                <div class="pos-pnl">
                    <div class="pos-pnl-value" style="color:${pnl.color}">${pnl.text}</div>
                    <div class="pos-pnl-id">ID: ${pos.id ?? '--'}</div>
                </div>
                <button class="pos-close-btn" onclick="closePosition(${pos.id})">平倉</button>
            </div>`;
        }

        function updatePositions(positions) {
            document.getElementById('position-count').textContent = positions.length;
            document.getElementById('positions-list').innerHTML = positions.length === 0
                ? '<div class="empty-state">目前無持倉</div>'
                : positions.map(renderPosition).join('');
        }

        // ═══ Equity Chart ═══
        let chartState = null;

        function initChart() {
            const c = document.getElementById('equity-chart');
            if (!c) return;
            c.width = c.offsetWidth * (window.devicePixelRatio || 1);
            c.height = 220 * (window.devicePixelRatio || 1);
            c.style.width = c.offsetWidth + 'px';
            c.style.height = '220px';
            const ctx = c.getContext('2d');
            ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, c.offsetWidth, 220);
            ctx.fillStyle = '#64748b';
            ctx.font = '13px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('等待交易數據...', c.offsetWidth / 2, 110);
        }

        function drawChart(trades) {
            if (!trades?.length) return;
            const canvas = document.getElementById('equity-chart');
            if (!canvas) return;

            const dpr = window.devicePixelRatio || 1;
            const w = canvas.offsetWidth;
            const h = 220;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';

            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);

            const sorted = [...trades].reverse();
            const vals = sorted.map(t => t.balance);
            chartState = { vals, sorted, w, h };

            renderChart(ctx, chartState);

            canvas.onmousemove = e => {
                const r = canvas.getBoundingClientRect();
                renderChart(ctx, chartState, e.clientX - r.left, e.clientY - r.top);
            };
            canvas.onmouseleave = () => renderChart(ctx, chartState);
        }

        function renderChart(ctx, s, mx, my) {
            const { vals, sorted, w, h } = s;
            const pad = { t: 20, r: 15, b: 30, l: 50 };
            const cw = w - pad.l - pad.r;
            const ch = h - pad.t - pad.b;

            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, w, h);

            if (vals.length < 2) {
                ctx.fillStyle = '#64748b';
                ctx.font = '13px Inter';
                ctx.textAlign = 'center';
                ctx.fillText('需要至少 2 筆交易', w / 2, h / 2);
                return;
            }

            const min = Math.min(...vals);
            const max = Math.max(...vals);
            const range = max - min || 1;
            const step = cw / (vals.length - 1);

            const getX = i => pad.l + i * step;
            const getY = v => pad.t + ch - ((v - min) / range) * ch;

            // Grid lines
            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = pad.t + (ch / 4) * i;
                ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
            }

            // Gradient fill
            const grad = ctx.createLinearGradient(0, pad.t, 0, h - pad.b);
            grad.addColorStop(0, 'rgba(99, 102, 241, 0.25)');
            grad.addColorStop(1, 'rgba(99, 102, 241, 0.01)');
            ctx.beginPath();
            ctx.moveTo(getX(0), h - pad.b);
            vals.forEach((v, i) => ctx.lineTo(getX(i), getY(v)));
            ctx.lineTo(getX(vals.length - 1), h - pad.b);
            ctx.closePath();
            ctx.fillStyle = grad;
            ctx.fill();

            // Line
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            vals.forEach((v, i) => { i === 0 ? ctx.moveTo(getX(i), getY(v)) : ctx.lineTo(getX(i), getY(v)); });
            ctx.stroke();

            // Dots
            vals.forEach((v, i) => {
                ctx.beginPath();
                ctx.arc(getX(i), getY(v), 3, 0, Math.PI * 2);
                ctx.fillStyle = sorted[i]?.profit >= 0 ? '#10b981' : '#ef4444';
                ctx.fill();
            });

            // Y labels
            ctx.fillStyle = '#64748b';
            ctx.font = '10px JetBrains Mono';
            ctx.textAlign = 'right';
            for (let i = 0; i <= 4; i++) {
                const v = min + (range / 4) * (4 - i);
                ctx.fillText('$' + v.toFixed(0), pad.l - 6, pad.t + (ch / 4) * i + 4);
            }

            // X labels
            ctx.textAlign = 'center';
            ctx.fillText('#1', getX(0), h - 8);
            ctx.fillText('#' + vals.length, getX(vals.length - 1), h - 8);

            // Crosshair
            if (mx !== undefined && mx >= pad.l && mx <= w - pad.r && my >= pad.t && my <= h - pad.b) {
                const idx = Math.max(0, Math.min(Math.round((mx - pad.l) / step), vals.length - 1));
                const cx = getX(idx);
                const cy = getY(vals[idx]);

                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(cx, pad.t); ctx.lineTo(cx, h - pad.b); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(pad.l, my); ctx.lineTo(w - pad.r, my); ctx.stroke();
                ctx.setLineDash([]);

                // Highlight dot
                ctx.beginPath();
                ctx.arc(cx, cy, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#6366f1';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Tooltip
                const trade = sorted[idx];
                const bw = 135, bh = 52;
                let bx = cx + 12; if (bx + bw > w - 5) bx = cx - bw - 12;
                let by = cy - bh / 2; by = Math.max(5, Math.min(by, h - bh - 5));

                ctx.fillStyle = 'rgba(17, 24, 39, 0.95)';
                ctx.beginPath();
                ctx.roundRect(bx, by, bw, bh, 6);
                ctx.fill();
                ctx.strokeStyle = 'rgba(99, 102, 241, 0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.font = 'bold 11px JetBrains Mono';
                ctx.textAlign = 'left';
                ctx.fillStyle = '#94a3b8';
                ctx.fillText(`#${idx + 1}  ${trade?.type?.toUpperCase() || ''}`, bx + 8, by + 17);

                ctx.fillStyle = '#f1f5f9';
                ctx.fillText(`$${vals[idx].toFixed(2)}`, bx + 8, by + 33);

                if (trade?.profit != null) {
                    const pColor = trade.profit >= 0 ? '#10b981' : '#ef4444';
                    ctx.fillStyle = pColor;
                    ctx.font = '10px JetBrains Mono';
                    ctx.fillText((trade.profit >= 0 ? '+' : '') + '$' + trade.profit.toFixed(2), bx + 8, by + 46);
                }
            }
        }

        // ═══ UI Update ═══
        function updateUI(data) {
            const el = id => document.getElementById(id);

            // Connection status
            if (!socketConnected) {
                const cp = el('conn-pill');
                if (data.connected && data.authenticated) {
                    cp.className = 'pill pill-green'; cp.innerHTML = '<span class="pill-dot"></span>已連線';
                } else if (data.connected) {
                    cp.className = 'pill pill-amber'; cp.innerHTML = '<span class="pill-dot"></span>連線中...';
                } else {
                    cp.className = 'pill pill-red'; cp.innerHTML = '<span class="pill-dot"></span>未連線';
                }
            }

            // Watch
            const wp = el('watch-pill');
            if (data.isWatching) {
                wp.className = 'pill pill-blue'; wp.innerHTML = '<span class="pill-dot"></span>盯盤中';
            } else {
                wp.className = 'pill pill-muted'; wp.innerHTML = '<span class="pill-dot"></span>待機';
            }

            // Trade
            const tp = el('trade-pill');
            if (data.todayTradeDone) {
                tp.className = 'pill pill-green'; tp.innerHTML = '<span class="pill-dot"></span>今日已交易';
            } else {
                tp.className = 'pill pill-muted'; tp.innerHTML = '<span class="pill-dot"></span>等待進場';
            }

            // Pause
            const pp = el('pause-pill');
            const pb = el('pause-btn');
            if (data.tradingPaused) {
                pp.style.display = ''; pb.textContent = '▶️ 繼續交易'; pb.className = 'btn btn-green';
            } else {
                pp.style.display = 'none'; pb.textContent = '⏸️ 暫停交易'; pb.className = 'btn btn-orange';
            }

            // Price with flash animation
            const curPrice = data.currentPrice ? data.currentPrice / PRICE_MULTIPLIER : null;
            const openPrice = data.openPrice ? data.openPrice / PRICE_MULTIPLIER : null;
            const priceEl = el('current-price');

            if (curPrice) {
                priceEl.textContent = curPrice.toFixed(2);
                if (lastPrice !== null && curPrice !== lastPrice) {
                    priceEl.classList.remove('price-flash-up', 'price-flash-down');
                    void priceEl.offsetWidth; // force reflow
                    priceEl.classList.add(curPrice > lastPrice ? 'price-flash-up' : 'price-flash-down');
                }
                lastPrice = curPrice;
            }

            el('open-price').textContent = openPrice ? openPrice.toFixed(2) : '--';

            if (curPrice && openPrice) {
                const diff = curPrice - openPrice;
                const diffEl = el('price-diff');
                diffEl.textContent = (diff > 0 ? '+' : '') + diff.toFixed(2);
                diffEl.style.color = diff > 0 ? 'var(--green)' : (diff < 0 ? 'var(--red)' : 'var(--text-primary)');
            }

            // Bid/Ask
            if (data.bid) el('bid-price').textContent = (data.bid / PRICE_MULTIPLIER).toFixed(2);
            if (data.ask) el('ask-price').textContent = (data.ask / PRICE_MULTIPLIER).toFixed(2);

            // Stats
            el('balance').textContent = '$' + (data.balance || 0).toFixed(2);
            el('equity').textContent = '$' + (data.equity || data.balance || 0).toFixed(2);
            el('usedMargin').textContent = '$' + (data.usedMargin || 0).toFixed(2);
            el('freeMargin').textContent = '$' + (data.freeMargin || data.balance || 0).toFixed(2);
            el('win-rate').textContent = data.winRate || '--';
            el('wins').textContent = data.wins || 0;
            el('losses').textContent = data.losses || 0;
            el('leverage').textContent = data.leverage ? '1:' + data.leverage : '--';

            const eqEl = el('equity');
            eqEl.className = 'stat-value' + (data.unrealizedPnL > 0 ? ' c-green' : (data.unrealizedPnL < 0 ? ' c-red' : ''));

            // Config (first load only)
            if (data.config && !window._cfgLoaded) {
                ['entryOffset', 'longTP', 'shortTP', 'longSL', 'shortSL', 'lotSize', 'minsAfterOpen', 'baselineOffsetMinutes'].forEach(f => {
                    const e = el('cfg-' + f); if (e && data.config[f] !== undefined) e.value = data.config[f];
                });
                window._cfgLoaded = true;
            }

            updatePositions(data.positions || []);
            if (data.logs?.length) el('logs').innerHTML = data.logs.map(l => `<div>${l}</div>`).join('');
            if (data.trades) drawChart(data.trades);
        }

        const throttledUI = throttle(updateUI, 100);

        // ═══ Socket.IO ═══
        function initSocket() {
            const s = document.createElement('script');
            s.src = '/socket.io/socket.io.js';
            s.onload = () => {
                socket = io();
                socket.on('connect', () => {
                    socketConnected = true;
                    const cp = document.getElementById('conn-pill');
                    cp.className = 'pill pill-green';
                    cp.innerHTML = '<span class="pill-dot"></span>即時連線';
                });
                socket.on('disconnect', () => { socketConnected = false; });
                socket.on('initial-state', updateUI);
                socket.on('realtime-update', throttledUI);
                socket.on('account-update', d => {
                    if (d.balance !== undefined) document.getElementById('balance').textContent = '$' + d.balance.toFixed(2);
                });
                socket.on('positions-update', d => updatePositions(d.positions || []));
                socket.on('new-log', msg => {
                    const c = document.getElementById('logs');
                    const div = document.createElement('div');
                    div.textContent = msg;
                    c.insertBefore(div, c.firstChild);
                    while (c.children.length > 80) c.removeChild(c.lastChild);
                });
            };
            document.head.appendChild(s);
        }

        // ═══ API ═══
        async function fetchStatus() {
            if (socketConnected && Date.now() - lastLogFetch < 10000) return;
            lastLogFetch = Date.now();
            try {
                const res = await fetch(API_URL + '/status');
                const data = await res.json();
                if (socketConnected) {
                    if (data.logs) document.getElementById('logs').innerHTML = data.logs.map(l => `<div>${l}</div>`).join('');
                } else {
                    updateUI(data);
                }
            } catch (e) { /* ignore */ }
        }

        async function doAction(action, config = null) {
            try {
                const body = { action };
                if (config) body.config = config;
                const res = await fetch(API_URL + '/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.success) updateUI(data.state);
                else alert('操作失敗: ' + (data.error || data.message || '未知錯誤'));
            } catch (e) { alert('請求失敗: ' + e.message); }
        }

        function toggleWatch() { doAction('toggleWatch'); }
        function togglePause() { doAction('togglePause'); }
        function resetDaily() { if (confirm('確定要重置今日交易狀態嗎？')) doAction('reset'); }
        function closeAllPositions() { if (confirm('⚠️ 確定要緊急平倉所有持倉嗎？')) doAction('closePositions'); }

        async function fetchOpenPrice() {
            const res = await fetch(API_URL + '/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'fetchOpenPrice' })
            });
            const data = await res.json();
            if (data.success) { alert('✅ 基準點已取得'); updateUI(data.state); }
            else alert('❌ ' + (data.message || '取得基準點失敗'));
        }

        async function closePosition(id) {
            if (!confirm(`確定要平倉持倉 ID: ${id} 嗎？`)) return;
            try {
                const res = await fetch(API_URL + '/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'closePosition', positionId: id })
                });
                const data = await res.json();
                if (data.success) updateUI(data.state);
                else alert('平倉失敗: ' + (data.error || '未知錯誤'));
            } catch (e) { alert('請求失敗: ' + e.message); }
        }

        function saveConfig() {
            const cfg = {};
            ['entryOffset', 'longTP', 'shortTP', 'longSL', 'shortSL', 'lotSize', 'minsAfterOpen', 'baselineOffsetMinutes']
                .forEach(f => cfg[f] = document.getElementById('cfg-' + f).value);
            doAction('updateConfig', cfg);
            alert('✅ 策略參數已儲存');
        }

        // ═══ Init ═══
        initSocket();
        initChart();
        fetchStatus();
        setInterval(fetchStatus, 2000);
    </script>
</body>

</html>
