<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US30 Trading Bot Dashboard</title>
<style>
:root {
  --bg:      #0f172a;
  --card:    #1e293b;
  --border:  rgba(255,255,255,0.07);
  --text:    #f8fafc;
  --muted:   #94a3b8;
  --dim:     #64748b;
  --blue:    #3b82f6;
  --green:   #22c55e;
  --red:     #ef4444;
  --yellow:  #eab308;
  --orange:  #f97316;
  --purple:  #8b5cf6;
}
*, *::before, *::after { box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 16px; }
.container { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

/* Header */
.header { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; }
.header h1 { margin: 0 0 12px; font-size: 1.4rem; background: linear-gradient(135deg,var(--blue),var(--purple)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.badges { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; }
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 20px; font-size: 0.82rem; font-weight: 500; }
.badge-ok      { background: rgba(34,197,94,.18);  color: var(--green);  }
.badge-bad     { background: rgba(239,68,68,.18);  color: var(--red);    }
.badge-active  { background: rgba(59,130,246,.18); color: var(--blue);   }
.badge-idle    { background: rgba(100,116,139,.18); color: var(--muted); }
.badge-paused  { background: rgba(249,115,22,.18); color: var(--orange); }

/* Card */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
.card-title { font-size: 0.88rem; color: var(--muted); margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }

/* Price */
.price-display { text-align: center; font-size: 2.8rem; font-weight: 700; font-variant-numeric: tabular-nums; margin: 8px 0; }
.price-sub { text-align: center; font-size: 0.92rem; color: var(--muted); }
.price-sub span { color: var(--text); font-weight: 600; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px,1fr)); gap: 10px; }
.stat { background: rgba(0,0,0,.25); padding: 12px; border-radius: 8px; text-align: center; }
.stat-label { font-size: 0.72rem; color: var(--dim); margin-bottom: 4px; }
.stat-value { font-size: 1.15rem; font-weight: 700; }
.green { color: var(--green); }
.red   { color: var(--red);   }
.blue  { color: var(--blue);  }

/* Params */
.params-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px,1fr)); gap: 10px; margin-bottom: 14px; }
.field label { display: block; font-size: 0.68rem; color: var(--dim); margin-bottom: 4px; }
.field input  { width: 100%; padding: 7px 9px; border-radius: 6px; border: 1px solid #334155; background: var(--bg); color: var(--text); font-size: 0.88rem; }
.field input:focus { outline: none; border-color: var(--blue); }

/* Buttons */
button { padding: 9px 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.87rem; transition: opacity .15s, transform .1s; }
button:hover  { opacity: .88; }
button:active { transform: scale(.97); }
.btn-blue   { background: var(--blue);   color: #fff; }
.btn-green  { background: var(--green);  color: #fff; }
.btn-red    { background: var(--red);    color: #fff; }
.btn-yellow { background: var(--yellow); color: #000; }
.btn-orange { background: var(--orange); color: #fff; }
.btn-sm     { padding: 5px 10px; font-size: 0.78rem; }
.actions    { display: flex; flex-wrap: wrap; gap: 8px; }

/* Positions */
.position { background: rgba(0,0,0,.25); border-left: 4px solid; border-radius: 8px; padding: 11px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.pos-long  { border-left-color: var(--green); }
.pos-short { border-left-color: var(--red);   }
.pos-info  { flex: 1; }
.pos-type  { font-weight: 700; font-size: 1rem; }
.pos-meta  { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }
.pos-pnl   { text-align: right; flex-shrink: 0; }
.pnl-val   { font-size: 1.05rem; font-weight: 700; }
.pos-id    { font-size: 0.68rem; color: var(--dim); }
.no-pos    { text-align: center; color: var(--dim); padding: 20px; font-size: 0.9rem; }

/* Chart */
#equity-chart { width: 100%; height: 200px; border-radius: 8px; display: block; }

/* Logs */
.log-box { background: #000; padding: 12px 14px; border-radius: 10px; font-family: 'Roboto Mono', monospace; height: 200px; overflow-y: auto; font-size: 0.78rem; color: #33ff33; }
.log-box::-webkit-scrollbar { width: 5px; }
.log-box::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

@media (max-width: 560px) {
  .price-display { font-size: 2.2rem; }
  .stats-grid    { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>🤖 US30 cTrader Bot</h1>
    <div class="badges">
      <span id="b-conn"  class="badge badge-bad">⚪ 連線中...</span>
      <span id="b-watch" class="badge badge-idle">👁️ 待機</span>
      <span id="b-trade" class="badge badge-idle">⏳ 等待進場</span>
      <span id="b-pause" class="badge badge-paused" style="display:none">⏸️ 交易暫停</span>
    </div>
  </div>

  <!-- Price -->
  <div class="card">
    <div class="card-title">即時價格</div>
    <div class="price-display" id="cur-price">--</div>
    <div class="price-sub">
      基準點:&nbsp;<span id="open-price">--</span>
      &nbsp;|&nbsp;
      價差:&nbsp;<span id="price-diff">--</span>
    </div>
  </div>

  <!-- Account stats -->
  <div class="card">
    <div class="card-title">📊 帳戶統計</div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">餘額</div><div class="stat-value green" id="s-balance">$--</div></div>
      <div class="stat"><div class="stat-label">淨值</div><div class="stat-value" id="s-equity">$--</div></div>
      <div class="stat"><div class="stat-label">已用保證金</div><div class="stat-value" id="s-usedMargin">$--</div></div>
      <div class="stat"><div class="stat-label">可用保證金</div><div class="stat-value" id="s-freeMargin">$--</div></div>
      <div class="stat"><div class="stat-label">勝率</div><div class="stat-value" id="s-winRate">--</div></div>
      <div class="stat"><div class="stat-label">總勝場</div><div class="stat-value green" id="s-wins">0</div></div>
      <div class="stat"><div class="stat-label">總敗場</div><div class="stat-value red"   id="s-losses">0</div></div>
      <div class="stat"><div class="stat-label">槓桿</div><div class="stat-value" id="s-leverage">--</div></div>
    </div>
  </div>

  <!-- Equity chart -->
  <div class="card">
    <div class="card-title">📈 績效曲線</div>
    <canvas id="equity-chart"></canvas>
  </div>

  <!-- Strategy params -->
  <div class="card">
    <div class="card-title">
      ⚙️ 策略參數
      <button class="btn-blue btn-sm" onclick="saveConfig()">💾 儲存</button>
    </div>
    <div class="params-grid">
      <div class="field"><label>Entry Offset</label><input type="number" id="cfg-entryOffset" value="10"></div>
      <div class="field"><label>Long TP</label><input type="number" id="cfg-longTP" value="8"></div>
      <div class="field"><label>Short TP</label><input type="number" id="cfg-shortTP" value="5"></div>
      <div class="field"><label>Long SL</label><input type="number" id="cfg-longSL" value="1000"></div>
      <div class="field"><label>Short SL</label><input type="number" id="cfg-shortSL" value="1000"></div>
      <div class="field"><label>Lot Size</label><input type="number" id="cfg-lotSize" value="0.1" step="0.01"></div>
      <div class="field"><label>盯盤開始(分)</label><input type="number" id="cfg-minsAfterOpen" value="1" min="0" max="60"></div>
      <div class="field"><label>基準偏移(分)</label><input type="number" id="cfg-baselineOffsetMinutes" value="0" min="0" max="60"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="card">
    <div class="card-title">🎮 操作控制</div>
    <div class="actions">
      <button class="btn-blue"   onclick="toggleWatch()">👁️ 切換盯盤</button>
      <button id="pause-btn" class="btn-orange" onclick="togglePause()">⏸️ 暫停交易</button>
      <button class="btn-green"  onclick="fetchOpenPrice()">📊 取得基準點</button>
      <button class="btn-yellow" onclick="resetDaily()">🔄 重置今日</button>
      <button class="btn-red"    onclick="closeAllPositions()">⚠️ 緊急平倉</button>
    </div>
  </div>

  <!-- Positions -->
  <div class="card">
    <div class="card-title">📈 當前持倉 (<span id="pos-count">0</span>)</div>
    <div id="pos-list"><div class="no-pos">目前無持倉</div></div>
  </div>

  <!-- Logs -->
  <div class="card">
    <div class="card-title">📜 即時日誌</div>
    <div class="log-box" id="logs"><div>等待日誌...</div></div>
  </div>

</div>

<script>
const PM = 100_000; // price multiplier
let socket = null, socketUp = false, lastPoll = 0, cfgLoaded = false;
let chartData = null, chartCfg = null;

// ── Helpers ──────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const fmt = (n, d=2) => n == null ? '--' : n.toFixed(d);
const fmtMoney = n => '$' + fmt(n);
const throttle = (fn, ms) => { let t; return (...a) => { if (!t) { fn(...a); t = setTimeout(() => t=null, ms); } }; };

function pnlStyle(v) {
  if (v == null) return { text: '--', color: 'var(--muted)' };
  return { text: (v >= 0 ? '+' : '') + fmtMoney(v), color: v >= 0 ? 'var(--green)' : 'var(--red)' };
}

// ── Positions ────────────────────────────────────────────────────────────────
function posCard(pos) {
  const icon  = pos.type === 'long' ? '📈' : '📉';
  const cls   = pos.type === 'long' ? 'pos-long' : 'pos-short';
  const { text, color } = pnlStyle(pos.pnl);
  return `<div class="position ${cls}">
    <div class="pos-info">
      <div class="pos-type">${icon} ${pos.type.toUpperCase()}</div>
      <div class="pos-meta">Entry: ${fmt(pos.entryPrice)} | Vol: ${fmt(pos.volume)}</div>
    </div>
    <div class="pos-pnl">
      <div class="pnl-val" style="color:${color}">${text}</div>
      <div class="pos-id">ID: ${pos.id ?? '--'}</div>
    </div>
    <button class="btn-red btn-sm" onclick="closePosition(${pos.id})">平倉</button>
  </div>`;
}

function renderPositions(list) {
  $('pos-count').textContent = list.length;
  $('pos-list').innerHTML = list.length ? list.map(posCard).join('') : '<div class="no-pos">目前無持倉</div>';
}

// ── Equity Chart ─────────────────────────────────────────────────────────────
function initChart() {
  const c = $('equity-chart'); if (!c) return;
  c.width = c.offsetWidth || 600; c.height = 200;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,c.width,c.height);
  ctx.fillStyle = 'var(--dim)'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('等待交易數據...', c.width/2, c.height/2);
}

function drawChart(trades) {
  if (!trades?.length) return;
  const c = $('equity-chart'); if (!c) return;
  const ctx = c.getContext('2d');
  c.width = c.offsetWidth || 600; c.height = 200;

  const values = [...trades].reverse().map(t => t.balance);
  const W = c.width, H = c.height, P = 45;
  const mn = Math.min(...values), mx = Math.max(...values), rng = mx - mn || 1;
  chartData = { values, trades: [...trades].reverse() };
  chartCfg  = { W, H, P, mn, mx, rng };
  _drawBase(ctx, chartData, chartCfg);

  c.onmousemove = e => {
    const r = c.getBoundingClientRect();
    _drawBase(ctx, chartData, chartCfg);
    _drawCrosshair(ctx, e.clientX - r.left, e.clientY - r.top, chartData, chartCfg);
  };
  c.onmouseleave = () => _drawBase(ctx, chartData, chartCfg);
}

function _drawBase(ctx, d, cfg) {
  const { values } = d;
  const { W, H, P, mn, mx, rng } = cfg;
  ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,W,H);
  if (values.length < 2) {
    ctx.fillStyle = 'var(--dim)'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('需要至少 2 筆交易', W/2, H/2); return;
  }
  const step = (W - P*2) / (values.length - 1);
  const px = (i,v) => [P + i*step, H - P - ((v-mn)/rng)*(H-P*2)];

  // Fill
  ctx.beginPath(); ctx.moveTo(P, H-P);
  values.forEach((v,i) => { const [x,y] = px(i,v); ctx.lineTo(x,y); });
  ctx.lineTo(P+(values.length-1)*step, H-P); ctx.closePath();
  ctx.fillStyle = 'rgba(59,130,246,.13)'; ctx.fill();

  // Line
  ctx.strokeStyle = 'var(--blue)'; ctx.lineWidth = 2; ctx.beginPath();
  values.forEach((v,i) => { const [x,y] = px(i,v); i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); });
  ctx.stroke();

  // Dots
  values.forEach((v,i) => {
    const [x,y] = px(i,v);
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle = 'var(--blue)'; ctx.fill();
  });

  // Labels
  ctx.fillStyle = 'var(--dim)'; ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';  ctx.fillText('$'+mx.toFixed(0), 5, P);
  ctx.fillText('$'+mn.toFixed(0), 5, H-P+15);
  ctx.textAlign = 'center'; ctx.fillText('#1', P, H-4); ctx.fillText('#'+values.length, W-P, H-4);
}

function _drawCrosshair(ctx, mx, my, d, cfg) {
  const { values } = d;
  const { W, H, P, mn, rng } = cfg;
  if (mx < P || mx > W-P || my < P || my > H-P) return;
  const step = (W-P*2)/(values.length-1);
  const idx  = Math.max(0, Math.min(Math.round((mx-P)/step), values.length-1));
  const cx   = P + idx*step;
  const cy   = H - P - ((values[idx]-mn)/rng)*(H-P*2);

  ctx.strokeStyle = 'rgba(255,255,255,.4)'; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(cx,P); ctx.lineTo(cx,H-P); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(P,my); ctx.lineTo(W-P,my); ctx.stroke();
  ctx.setLineDash([]);

  ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2);
  ctx.fillStyle = 'var(--blue)'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

  const bW=120, bH=44;
  let bx = cx+12; if (bx+bW > W-8) bx = cx-bW-12;
  let by = cy-bH/2; if (by<4) by=4; if (by+bH>H-4) by=H-bH-4;
  ctx.fillStyle = 'rgba(30,41,59,.95)'; ctx.fillRect(bx,by,bW,bH);
  ctx.strokeStyle = 'var(--blue)'; ctx.lineWidth=1; ctx.strokeRect(bx,by,bW,bH);
  ctx.fillStyle = '#f8fafc'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(`#${idx+1}`, bx+8, by+15);
  ctx.fillStyle = values[idx] >= values[0] ? 'var(--green)' : 'var(--red)';
  ctx.fillText(`$${values[idx].toFixed(2)}`, bx+8, by+33);
}

// ── UI Update ────────────────────────────────────────────────────────────────
function updateUI(data) {
  // Connection badges
  if (!socketUp) {
    const [txt,cls] = data.connected && data.authenticated
      ? ['🟢 已連線','badge-ok'] : data.connected
      ? ['🟡 連線中...','badge-active'] : ['🔴 未連線','badge-bad'];
    $('b-conn').textContent = txt;
    $('b-conn').className   = `badge ${cls}`;
  }
  $('b-watch').textContent = data.isWatching ? '👁️ 盯盤中' : '💤 待機';
  $('b-watch').className   = `badge ${data.isWatching ? 'badge-active' : 'badge-idle'}`;
  $('b-trade').textContent = data.todayTradeDone ? '✅ 今日已交易' : '⏳ 等待進場';
  $('b-trade').className   = `badge ${data.todayTradeDone ? 'badge-ok' : 'badge-idle'}`;

  // Pause
  const paused = data.tradingPaused;
  $('b-pause').style.display = paused ? '' : 'none';
  $('pause-btn').textContent = paused ? '▶️ 繼續交易' : '⏸️ 暫停交易';
  $('pause-btn').className   = paused ? 'btn-green' : 'btn-orange';

  // Price
  const cur  = data.currentPrice ? data.currentPrice / PM : null;
  const open = data.openPrice    ? data.openPrice    / PM : null;
  $('cur-price').textContent  = cur  ? cur.toFixed(2)  : '--';
  $('open-price').textContent = open ? open.toFixed(2) : '--';
  if (cur && open) {
    const diff = cur - open;
    $('price-diff').textContent = (diff>0?'+':'')+diff.toFixed(2);
    $('price-diff').className   = diff>0 ? 'green' : diff<0 ? 'red' : '';
  }

  // Stats
  $('s-balance').textContent    = fmtMoney(data.balance ?? 0);
  $('s-equity').textContent     = fmtMoney(data.equity ?? data.balance ?? 0);
  $('s-usedMargin').textContent = fmtMoney(data.usedMargin ?? 0);
  $('s-freeMargin').textContent = fmtMoney(data.freeMargin ?? data.balance ?? 0);
  $('s-winRate').textContent    = data.winRate  || '--';
  $('s-wins').textContent       = data.wins     || 0;
  $('s-losses').textContent     = data.losses   || 0;
  $('s-leverage').textContent   = data.leverage ? '1:'+data.leverage : '--';

  const eq = $('s-equity');
  eq.className = 'stat-value' + (data.unrealizedPnL > 0 ? ' green' : data.unrealizedPnL < 0 ? ' red' : '');

  // Config (once)
  if (data.config && !cfgLoaded) {
    ['entryOffset','longTP','shortTP','longSL','shortSL','lotSize','minsAfterOpen','baselineOffsetMinutes'].forEach(k => {
      const el = $('cfg-'+k); if (el && data.config[k] != null) el.value = data.config[k];
    });
    cfgLoaded = true;
  }

  renderPositions(data.positions || []);
  if (data.logs?.length) $('logs').innerHTML = data.logs.map(l=>`<div>${l}</div>`).join('');
  if (data.trades)       drawChart(data.trades);
}

const throttledUpdate = throttle(updateUI, 100);

// ── Socket.IO ────────────────────────────────────────────────────────────────
(function initIO() {
  const s = document.createElement('script');
  s.src = '/socket.io/socket.io.js';
  s.onload = () => {
    socket = io();
    socket.on('connect',    () => { socketUp = true; $('b-conn').textContent = '🟢 即時連線'; $('b-conn').className = 'badge badge-ok'; });
    socket.on('disconnect', () => { socketUp = false; });
    socket.on('initial-state',   updateUI);
    socket.on('realtime-update', throttledUpdate);
    socket.on('account-update',  d => { if (d.balance != null) $('s-balance').textContent = fmtMoney(d.balance); });
    socket.on('positions-update',d => renderPositions(d.positions || []));
    socket.on('new-log', msg => {
      const box = $('logs');
      const div = document.createElement('div'); div.textContent = msg;
      box.insertBefore(div, box.firstChild);
      while (box.children.length > 60) box.removeChild(box.lastChild);
    });
  };
  document.head.appendChild(s);
})();

// ── REST polling ─────────────────────────────────────────────────────────────
async function poll() {
  if (socketUp && Date.now() - lastPoll < 10_000) return;
  lastPoll = Date.now();
  try {
    const data = await fetch('/api/status').then(r=>r.json());
    if (socketUp) { if (data.logs) $('logs').innerHTML = data.logs.map(l=>`<div>${l}</div>`).join(''); }
    else updateUI(data);
  } catch { /* ignore */ }
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function act(action, extra = {}) {
  try {
    const r = await fetch('/api/action', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action, ...extra }) });
    const d = await r.json();
    if (d.success) updateUI(d.state);
    else alert('操作失敗: ' + (d.error || d.message || '未知錯誤'));
  } catch(e) { alert('請求失敗: ' + e.message); }
}

function toggleWatch()      { act('toggleWatch'); }
function togglePause()      { act('togglePause'); }
function resetDaily()       { if (confirm('確定要重置今日交易狀態嗎？')) act('reset'); }
function closeAllPositions(){ if (confirm('⚠️ 確定要緊急平倉所有持倉嗎？')) act('closePositions'); }
function closePosition(id)  { if (confirm(`確定要平倉 ID:${id} 嗎？`)) act('closePosition', { positionId: id }); }

async function fetchOpenPrice() {
  try {
    const r = await fetch('/api/action', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'fetchOpenPrice' }) });
    const d = await r.json();
    if (d.success) { alert('✅ 基準點已取得'); updateUI(d.state); }
    else alert('❌ ' + (d.message || '取得基準點失敗'));
  } catch(e) { alert('請求失敗: ' + e.message); }
}

function saveConfig() {
  const keys = ['entryOffset','longTP','shortTP','longSL','shortSL','lotSize','minsAfterOpen','baselineOffsetMinutes'];
  const cfg  = Object.fromEntries(keys.map(k => [k, $('cfg-'+k).value]));
  act('updateConfig', { config: cfg });
  alert('✅ 策略參數已儲存');
}

// ── Init ──────────────────────────────────────────────────────────────────────
initChart();
poll();
setInterval(poll, 2000);
</script>
